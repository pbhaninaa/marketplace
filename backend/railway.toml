# Railway: set Root Directory = backend
# Do not override Start Command — Dockerfile ENTRYPOINT runs the JAR.
# Redeploy trigger: ensure PROD picks up latest CORS/MySQL config.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
