# Railway: set Root Directory = backend
# Do not override Start Command — Dockerfile ENTRYPOINT runs the JAR.
# Use liveness (process up) — not full /actuator/health — so MySQL warmup
# does not fail the deploy while the JVM is already running.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/actuator/health/liveness"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
