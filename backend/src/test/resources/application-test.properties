spring.main.banner-mode=off

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.datasource.url=jdbc:h2:mem:agrimarket_test;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

app.env=TEST
app.cors.allowed-origins[0]=http://localhost
app.jwt.secret=test-jwt-secret-key-at-least-32-characters-long!!
app.jwt.expiration-ms=86400000
app.cart.session-ttl-hours=72
app.payments.provider=stub
app.seed-demo-data=false
app.default-admin.seed=false

# Bank details for subscription EFT flow
app.bank.bank-name=Test Bank
app.bank.account-name=Agri Marketplace
app.bank.account-number=1234567890
app.bank.branch-code=0001
app.bank.reference-hint=Use your Provider Name as reference

# Subscription pricing (monthly)
app.subscription.pricing.basic-monthly=199
app.subscription.pricing.premium-monthly=499

logging.level.org.springframework.security=WARN
logging.level.com.agrimarket=INFO
