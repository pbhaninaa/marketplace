# Local MySQL (Workbench) — database: marketplace, user: root
# createDatabaseIfNotExist only creates an EMPTY database; JPA still must create tables.
# If you see: Table 'marketplace.users' doesn't exist —
#   1) Run the backend with the "local" profile (see application.properties: spring.profiles.active=local).
#   2) Confirm DB credentials (set env LOCAL_DB_PASSWORD if your MySQL root password differs).
#   3) Restart and watch logs for Hibernate DDL (or run once with ddl-auto=create below, then revert to update).
spring.datasource.url=jdbc:mysql://localhost:3306/marketplace?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${LOCAL_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# If image uploads fail with "Data too long for column 'data'" on an older DB, widen the column once:
# ALTER TABLE listing_images MODIFY COLUMN data LONGBLOB NOT NULL;

app.env=LOCAL
app.payments.provider=stub
app.seed-demo-data=false

# Local/dev JWT secret (do NOT use in production).
app.jwt.secret=${APP_JWT_SECRET:local-dev-jwt-secret-key-at-least-32-characters-long!!}

# First platform admin (only if none exists). Password override: LOCAL_ADMIN_PASSWORD
app.default-admin.seed=false
app.default-admin.email=${LOCAL_ADMIN_EMAIL:}
app.default-admin.password=${LOCAL_ADMIN_PASSWORD:}
app.default-admin.display-name=${LOCAL_ADMIN_DISPLAY_NAME:}

logging.level.com.agrimarket=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Email (SendGrid).
# Local default stays off, but you can enable sending by setting APP_EMAIL_ENABLED=true
# and providing SENDGRID_API_KEY + EMAIL_FROM in your environment.
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.from=${EMAIL_FROM:${SENDGRID_FROM:}}
app.email.public-app-base-url=${PUBLIC_APP_BASE_URL:http://localhost:5173}

# Bank details (local defaults)
app.bank.bank-name=Local Bank
app.bank.account-name=Agri Marketplace
app.bank.account-number=0000000000
app.bank.branch-code=
app.bank.reference-hint=Use your Provider Name as reference

# Subscription pricing (monthly, local defaults)
app.subscription.pricing.basic-monthly=199
app.subscription.pricing.premium-monthly=499
