# Production (PostgreSQL)
# Railway Postgres commonly provides PG* env vars; we also support explicit PROD_DB_* vars.
spring.datasource.url=jdbc:postgresql://${PROD_DB_HOST:${PGHOST}}:${PROD_DB_PORT:${PGPORT:5432}}/${PROD_DB_NAME:${PGDATABASE}}
spring.datasource.username=${PROD_DB_USER:${PGUSER}}
spring.datasource.password=${PROD_DB_PASSWORD:${PGPASSWORD}}
spring.datasource.hikari.maximum-pool-size=20

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Railway sets PORT for the web service.
server.port=${PORT:8080}

app.env=PROD
app.cors.allowed-origins=${PROD_CORS_ORIGINS}

# Admin bank details shown to providers for EFT deposits
app.bank.bank-name=${APP_BANK_NAME}
app.bank.account-name=${APP_BANK_ACCOUNT_NAME}
app.bank.account-number=${APP_BANK_ACCOUNT_NUMBER}
app.bank.branch-code=${APP_BANK_BRANCH_CODE:}
app.bank.reference-hint=${APP_BANK_REFERENCE_HINT:Use your Provider Name as reference}

# Subscription pricing (monthly, ZAR)
app.subscription.pricing.basic-monthly=${APP_SUBSCRIPTION_BASIC_MONTHLY}
app.subscription.pricing.premium-monthly=${APP_SUBSCRIPTION_PREMIUM_MONTHLY}

# Security: do not allow a built-in default secret in production.
app.jwt.secret=${APP_JWT_SECRET}
app.payments.provider=${PROD_PAYMENT_PROVIDER:stripe}
app.seed-demo-data=false

# Password reset links should point at your public frontend URL.
app.password-reset.public-app-base-url=${PUBLIC_APP_BASE_URL}

logging.level.root=WARN
logging.level.com.agrimarket=INFO

# Health check for load balancers / uptime monitors
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
