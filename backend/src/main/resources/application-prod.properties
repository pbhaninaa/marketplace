# PROD — live (Railway / docker-compose). Required env: PG* or PROD_DB_*, APP_JWT_SECRET,
# PROD_CORS_ORIGINS, PUBLIC_APP_BASE_URL, SENDGRID_API_KEY, EMAIL_FROM.

server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

spring.datasource.url=jdbc:postgresql://${PROD_DB_HOST:${PGHOST}}:${PROD_DB_PORT:${PGPORT:5432}}/${PROD_DB_NAME:${PGDATABASE}}
spring.datasource.username=${PROD_DB_USER:${PGUSER}}
spring.datasource.password=${PROD_DB_PASSWORD:${PGPASSWORD}}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

app.env=PROD
app.jwt.secret=${APP_JWT_SECRET}
app.payments.provider=${PROD_PAYMENT_PROVIDER:stub}
app.seed-demo-data=false

app.cors.allowed-origins=${PROD_CORS_ORIGINS}

app.password-reset.public-app-base-url=${PUBLIC_APP_BASE_URL}

app.email.enabled=true
app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.from=${EMAIL_FROM:}
app.email.public-app-base-url=${PUBLIC_APP_BASE_URL}

app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.twilio-account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio-auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.from-number=${TWILIO_FROM_NUMBER:}
app.sms.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}
app.sms.default-country-code=${APP_PHONE_COUNTRY_CODE:+27}

app.bank.bank-name=${APP_BANK_NAME:}
app.bank.account-name=${APP_BANK_ACCOUNT_NAME:}
app.bank.account-number=${APP_BANK_ACCOUNT_NUMBER:}
app.bank.branch-code=${APP_BANK_BRANCH_CODE:}
app.bank.reference-hint=${APP_BANK_REFERENCE_HINT:Use your Provider Name as reference}

app.subscription.pricing.basic-monthly=${APP_SUBSCRIPTION_BASIC_MONTHLY:199}
app.subscription.pricing.premium-monthly=${APP_SUBSCRIPTION_PREMIUM_MONTHLY:499}

logging.level.root=WARN
logging.level.com.agrimarket=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=false
