# Production (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${PROD_DB_HOST}:${PROD_DB_PORT:5432}/${PROD_DB_NAME}
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.env=PROD
app.cors.allowed-origins[0]=${PROD_CORS_ORIGINS:http://localhost:5173}
app.payments.provider=${PROD_PAYMENT_PROVIDER:stripe}
app.seed-demo-data=false

logging.level.root=WARN
logging.level.com.agrimarket=INFO
