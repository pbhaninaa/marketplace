# UAT — staging (Railway). Required env: MySQL via SPRING_DATASOURCE_* or MYSQL*,
# APP_JWT_SECRET, UAT_CORS_ORIGINS, PUBLIC_APP_BASE_URL, SENDGRID_API_KEY,
# and EMAIL_DOMAIN (or fallback EMAIL_FROM).
# SPRING_DATASOURCE_URL must be jdbc:mysql://... (not mysql://).

server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# MySQL (Railway MySQL plugin MYSQL* vars, or explicit SPRING_DATASOURCE_*)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

app.env=UAT
app.jwt.secret=${APP_JWT_SECRET}
app.payments.provider=${UAT_PAYMENT_PROVIDER:stub}
app.seed-demo-data=false

# Comma-separated origins, e.g. https://app-uat.example.com,http://localhost:5173
app.cors.allowed-origins=${UAT_CORS_ORIGINS}

app.password-reset.public-app-base-url=${PUBLIC_APP_BASE_URL:${APP_FRONTEND_URL}}

# Email (SendGrid Web API)
app.email.enabled=true
app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.from=${EMAIL_FROM:}
app.email.domain=${EMAIL_DOMAIN:}
app.email.public-app-base-url=${PUBLIC_APP_BASE_URL:${APP_FRONTEND_URL}}

# SMS (Twilio) — optional
app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.twilio-account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio-auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.from-number=${TWILIO_FROM_NUMBER:}
app.sms.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}
app.sms.default-country-code=${APP_PHONE_COUNTRY_CODE:+27}

# Platform bank details (provider subscription EFT)
app.bank.bank-name=${APP_BANK_NAME:}
app.bank.account-name=${APP_BANK_ACCOUNT_NAME:}
app.bank.account-number=${APP_BANK_ACCOUNT_NUMBER:}
app.bank.branch-code=${APP_BANK_BRANCH_CODE:}
app.bank.reference-hint=${APP_BANK_REFERENCE_HINT:Use your Provider Name as reference}

# Subscription pricing (monthly, ZAR)
app.subscription.pricing.basic-monthly=${APP_SUBSCRIPTION_BASIC_MONTHLY:199}
app.subscription.pricing.premium-monthly=${APP_SUBSCRIPTION_PREMIUM_MONTHLY:499}

logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.agrimarket=INFO

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.info.env.enabled=false
