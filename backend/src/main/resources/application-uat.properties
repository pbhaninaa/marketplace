# UAT — staging (Railway). Required env: UAT_DB_* or PG*, APP_JWT_SECRET, UAT_CORS_ORIGINS,
# PUBLIC_APP_BASE_URL, SENDGRID_API_KEY, EMAIL_FROM.

server.port=${PORT:8080}

# PostgreSQL (Railway PG* vars or explicit UAT_DB_*)
spring.datasource.url=jdbc:postgresql://${UAT_DB_HOST:${PGHOST}}:${UAT_DB_PORT:${PGPORT:5432}}/${UAT_DB_NAME:${PGDATABASE:agrimarket_uat}}
spring.datasource.username=${UAT_DB_USER:${PGUSER}}
spring.datasource.password=${UAT_DB_PASSWORD:${PGPASSWORD}}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.env=UAT
app.jwt.secret=${APP_JWT_SECRET}
app.payments.provider=${UAT_PAYMENT_PROVIDER:stub}
app.seed-demo-data=false

# Comma-separated origins, e.g. https://app-uat.example.com,http://localhost:5173
app.cors.allowed-origins=${UAT_CORS_ORIGINS}

app.password-reset.public-app-base-url=${PUBLIC_APP_BASE_URL:${APP_FRONTEND_URL}}

# Email (SendGrid Web API)
app.email.enabled=true
app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.from=${EMAIL_FROM:}
app.email.public-app-base-url=${PUBLIC_APP_BASE_URL:${APP_FRONTEND_URL}}

# Platform bank details (provider subscription EFT)
app.bank.bank-name=${APP_BANK_NAME:}
app.bank.account-name=${APP_BANK_ACCOUNT_NAME:}
app.bank.account-number=${APP_BANK_ACCOUNT_NUMBER:}
app.bank.branch-code=${APP_BANK_BRANCH_CODE:}
app.bank.reference-hint=${APP_BANK_REFERENCE_HINT:Use your Provider Name as reference}

# Subscription pricing (monthly, ZAR)
app.subscription.pricing.basic-monthly=${APP_SUBSCRIPTION_BASIC_MONTHLY:199}
app.subscription.pricing.premium-monthly=${APP_SUBSCRIPTION_PREMIUM_MONTHLY:499}

logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.agrimarket=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
