# UAT profile (Railway / production-like)
spring.jpa.hibernate.ddl-auto=update

# CORS + frontend base URL (use your provided env vars)
app.cors.allowed-origins[0]=${APP_FRONTEND_ALLOWED_ORIGINS:}

# Email (SendGrid)
app.email.enabled=true
app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.from=${EMAIL_FROM:}
app.email.public-app-base-url=${APP_FRONTEND_URL:https://example.com}

# Reduce noise in prod-like
logging.level.org.hibernate.SQL=INFO
logging.level.com.agrimarket=INFO

# User acceptance test (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${UAT_DB_HOST:localhost}:${UAT_DB_PORT:5432}/${UAT_DB_NAME:agrimarket_uat}
spring.datasource.username=${UAT_DB_USER:agrimarket}
spring.datasource.password=${UAT_DB_PASSWORD:agrimarket}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.env=UAT
app.cors.allowed-origins[0]=${UAT_CORS_ORIGINS:https://uat.example.com}
app.payments.provider=${UAT_PAYMENT_PROVIDER:paystack}
app.seed-demo-data=false

logging.level.com.agrimarket=INFO
