# System integration test (in-memory H2)
spring.datasource.url=jdbc:h2:mem:agrimarket_sit;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sit
spring.datasource.password=sit

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.env=SIT
app.cors.allowed-origins[0]=http://localhost:5173
app.cors.allowed-origins[1]=http://127.0.0.1:5173
app.payments.provider=stub
app.seed-demo-data=true

logging.level.com.agrimarket=DEBUG
logging.level.org.hibernate.SQL=DEBUG
