spring.application.name=agrimarketplace
spring.profiles.active=local

spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=80MB
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.env=LOCAL
app.cors.allowed-origins[0]=http://localhost:5173
app.cors.allowed-origins[1]=http://127.0.0.1:5173
app.jwt.secret=${APP_JWT_SECRET:change-me-in-real-deployments-min-256-bits-please-use-env-var}
app.jwt.expiration-ms=86400000
app.cart.session-ttl-hours=72
app.otp.ttl-minutes=10
app.otp.max-attempts=5
app.payments.provider=stub
app.seed-demo-data=false

app.password-reset.token-ttl-hours=24
app.password-reset.public-app-base-url=http://localhost:5173

server.port=8080
