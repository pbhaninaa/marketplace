spring.application.name=agrimarketplace
# Local dev: run with -Dspring.profiles.active=local (see application-local.properties).
# Deployed hosts MUST set SPRING_PROFILES_ACTIVE=uat or prod.

spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=80MB
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.env=LOCAL
# CORS: do NOT set indexed app.cors.allowed-origins[n] here — it overrides UAT/PROD
# scalar PROD_CORS_ORIGINS / UAT_CORS_ORIGINS. Profiles set the list (comma-separated).
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=86400000
app.cart.session-ttl-hours=72
app.otp.ttl-minutes=10
app.otp.max-attempts=5
app.payments.provider=stub
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.from=${EMAIL_FROM:}
app.email.domain=${EMAIL_DOMAIN:}
app.email.public-app-base-url=${PUBLIC_APP_BASE_URL:http://localhost:5173}

# SMS (Twilio) — optional; no-op when disabled
app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.twilio-account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio-auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.from-number=${TWILIO_FROM_NUMBER:}
app.sms.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}
app.sms.default-country-code=${APP_PHONE_COUNTRY_CODE:+27}
