server {
  listen 80;
  server_name _;
  server_tokens off;

  resolver 127.0.0.11 valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  # Match backend multipart limits (application.properties)
  client_max_body_size 80m;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # API reverse proxy (same-domain docker compose)
  location /api/ {
    set $backend "backend.railway.internal:8080";
    proxy_pass http://$backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }

  location /actuator/health {
    proxy_pass http://backend:8080/actuator/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Immutable Vite assets
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback — never cache index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
