services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROD_DB_NAME}
      POSTGRES_USER: ${PROD_DB_USER}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_DB_USER} -d ${PROD_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PROD_DB_HOST: db
      PROD_DB_PORT: 5432
      PROD_DB_NAME: ${PROD_DB_NAME}
      PROD_DB_USER: ${PROD_DB_USER}
      PROD_DB_PASSWORD: ${PROD_DB_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      PROD_CORS_ORIGINS: ${PROD_CORS_ORIGINS}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL}
      PROD_PAYMENT_PROVIDER: ${PROD_PAYMENT_PROVIDER:-stub}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      APP_BANK_NAME: ${APP_BANK_NAME:-}
      APP_BANK_ACCOUNT_NAME: ${APP_BANK_ACCOUNT_NAME:-}
      APP_BANK_ACCOUNT_NUMBER: ${APP_BANK_ACCOUNT_NUMBER:-}
      APP_BANK_BRANCH_CODE: ${APP_BANK_BRANCH_CODE:-}
      APP_BANK_REFERENCE_HINT: ${APP_BANK_REFERENCE_HINT:-Use your Provider Name as reference}
      APP_SUBSCRIPTION_BASIC_MONTHLY: ${APP_SUBSCRIPTION_BASIC_MONTHLY:-199}
      APP_SUBSCRIPTION_PREMIUM_MONTHLY: ${APP_SUBSCRIPTION_PREMIUM_MONTHLY:-499}
    depends_on:
      db:
        condition: service_healthy
    # API is only reachable via frontend nginx (/api). Do not publish 8080 publicly.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_APP_ENV: PROD
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  db_data:
